<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  {% seo %}
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --bg-card: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #5c5c5c;
      --text-muted: #8a8a8a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --border: #e5e5e0;
      --tag-tech: #dbeafe;
      --tag-tech-text: #1e40af;
      --tag-thought: #fef3c7;
      --tag-thought-text: #92400e;
      --tag-diy: #d1fae5;
      --tag-diy-text: #065f46;
      --code-bg: #f4f4f0;
      --max-w: 680px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --bg-card: #1a1a1a;
        --text: #e5e5e5;
        --text-secondary: #a0a0a0;
        --text-muted: #666666;
        --accent: #60a5fa;
        --accent-hover: #93bbfd;
        --accent-light: #1e293b;
        --border: #2a2a2a;
        --tag-tech: #1e3a5f;
        --tag-tech-text: #93c5fd;
        --tag-thought: #422006;
        --tag-thought-text: #fbbf24;
        --tag-diy: #064e3b;
        --tag-diy-text: #6ee7b7;
        --code-bg: #1e1e1e;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2.5rem 1.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.88rem;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); font-weight: 500; }

    /* ── Main ── */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }

    /* ── Home: Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .filter-tab:hover, .filter-tab.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-light);
    }

    /* ── Post list ── */
    .post-list { list-style: none; }

    .post-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .post-item:first-child { padding-top: 0; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .post-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .post-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-notes { background: var(--tag-tech); color: var(--tag-tech-text); }
    .tag-thoughts { background: var(--tag-thought); color: var(--tag-thought-text); }
    .tag-diy { background: var(--tag-diy); color: var(--tag-diy-text); }

    .post-title-link {
      text-decoration: none;
      color: var(--text);
    }

    .post-title-link:hover { color: var(--accent); }

    .post-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.3rem;
    }

    .post-excerpt {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Post/Article page ── */
    .post-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .post-header .post-title {
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
    }

    /* ── Article content ── */
    .post-content h2 {
      font-size: 1.3rem;
      margin: 2.5rem 0 0.8rem;
      font-weight: 600;
    }

    .post-content h3 {
      font-size: 1.1rem;
      margin: 2rem 0 0.6rem;
      font-weight: 600;
    }

    .post-content p {
      margin-bottom: 1.2rem;
      font-size: 0.95rem;
    }

    .post-content ul, .post-content ol {
      margin: 0 0 1.2rem 1.5rem;
      font-size: 0.95rem;
    }

    .post-content li { margin-bottom: 0.3rem; }

    .post-content code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85em;
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
    }

    .post-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    .post-content pre code {
      background: none;
      padding: 0;
      font-size: 0.83rem;
      line-height: 1.6;
    }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem 0;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
    }

    .back-link:hover { color: var(--accent); }

    /* ── Footer ── */
    footer {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>All</a>
      <a href="{{ '/notes' | relative_url }}" {% if page.url contains '/notes' %}class="active"{% endif %}>Notes</a>
      <a href="{{ '/thoughts' | relative_url }}" {% if page.url contains '/thoughts' %}class="active"{% endif %}>Thoughts</a>
      <a href="{{ '/diy' | relative_url }}" {% if page.url contains '/diy' %}class="active"{% endif %}>DIY</a>
      <a href="{{ '/about' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="https://github.com/rajendtamani">GitHub</a> · 
    <a href="{{ '/feed.xml' | relative_url }}">RSS</a> · 
    Powered by Jekyll & GitHub Pages
  </footer>
</body>
</html>
