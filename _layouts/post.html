---
layout: default
---
<a href="{{ '/' | relative_url }}" class="back-link">← Back to all posts</a>

<article>
  <div class="post-header">
    <div class="post-meta">
      <span class="post-date">{{ page.date | date: "%b %d, %Y" }}</span>
      {% if page.category %}
        <span class="post-tag tag-{{ page.category }}">{{ page.category }}</span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-excerpt">{{ page.description }}</p>
    {% endif %}
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
